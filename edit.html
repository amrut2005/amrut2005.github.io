<!DOCTYPE html>
<html>

<head>

<title>Edit Order</title>

<style>

body{
font-family: Arial;
background:#f5f5f5;
text-align:center;
}

.container{
background:white;
padding:30px;
width:500px;
margin:auto;
margin-top:50px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

input,select{
width:90%;
padding:10px;
margin:8px;
}

button{
padding:10px 20px;
background:#007bff;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="container">

<h2>Edit Customer Order</h2>

<input id="name" placeholder="Customer Name">

<input id="phone" placeholder="Mobile Number">

<input id="dress" placeholder="Dress Type">

<input id="amount" placeholder="Total Amount">

<input id="paid" placeholder="Amount Paid">

<input id="dueDate" type="date">

<select id="status">

<option>Stitching</option>
<option>Ready</option>
<option>Collected</option>

</select>

<br><br>

<button onclick="updateOrder()">Update Order</button>

</div>

<script type="module" src="script.js"></script>

<script>

window.onload = function(){
loadEditData()
}

</script>

</body>
</html>
