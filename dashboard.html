<!DOCTYPE html>

<html>

<head>
<title>Super Tailor Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Super Tailor Dashboard</h1>

<div style="display:flex;gap:20px;margin-bottom:20px;justify-content:center">

<div style="background:#f0f0f0;padding:15px;border-radius:8px;width:200px">
<h3>Total Orders</h3>
<p id="totalOrders">0</p>
</div>

<div style="background:#e0ffe0;padding:15px;border-radius:8px;width:200px">
<h3>Ready Orders</h3>
<p id="readyOrders">0</p>
</div>
  
<div style="background:#ffe0e0;padding:15px;border-radius:8px;width:200px">
<h3>Pending Orders</h3>
<p id="pendingOrders">0</p>
</div>

<div style="background:#e0f7ff;padding:15px;border-radius:8px;width:200px">
<h3>Collected Orders</h3>
<p id="collectedOrders">0</p>
</div>
  
<div style="background:#fff0e0;padding:15px;border-radius:8px;width:200px">
<h3>Pending Payment</h3>
<p id="pendingPayment">₹0</p>
</div>
  
</div>


<h2>Add Customer Order</h2>

<input id="name" placeholder="Customer Name">
<br><br>

<input id="phone" placeholder="Mobile Number">
<br><br>

<input id="dress" placeholder="Dress Type">
<br><br>

<input id="amount" placeholder="Total Amount">
<br><br>

<input id="paid" placeholder="Amount Paid">
<br><br>

<input id="dueDate" type="date">
<br><br>

<select id="status">
<option>Stitching</option>
<option>Ready</option>
<option>Collected</option>
</select>

<br><br>

<input type="file" id="photo">

<br><br>

<button onclick="saveOrder()">Save Order</button>

<hr>

<h2>Search Customer</h2>

<div style="display:flex;gap:10px;margin-bottom:10px">

<div class="searchBox">

<input 
type="text"
id="searchInput"
placeholder="Search name or phone..."
onkeyup="searchOrders()">

<select id="statusFilter" onchange="filterStatus()">
<option>All Status</option>
<option>Stitching</option>
<option>Ready</option>
<option>Collected</option>
</select>



</div>
  
<h2>Customer Orders</h2>

<table border="1" width="100%">

<thead>

<tr>
<th>Name</th>
<th>Phone</th>
<th>Dress</th>
<th>Amount</th>
<th>Paid</th>
<th>Due</th>
<th>Due Date</th>
<th>Collected Date</th>
<th>Status</th>
<th>Photo</th>
<th>Edit</th>
<th>Delete</th>
</tr>

</thead>

<tbody id="orderTable">

</tbody>

</table>

<script type="module" src="script.js"></script>

</body>
</html>
