<!DOCTYPE html>
<html>
<head>
<title>Super Tailor Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Super Tailor Dashboard</h1>

<input id="name" placeholder="Customer Name">

<input id="phone" placeholder="Mobile Number">

<input id="dress" placeholder="Dress Type">

<input id="amount" placeholder="Total Amount">

<input id="paid" placeholder="Amount Paid">

<input id="dueDate" type="date">

<select id="status">
<option>Stitching</option>
<option>Ready</option>
</select>
  
<input type="file" id="photo">
  
<button onclick="saveOrder()">Save Order</button>

<script type="module" src="script.js"></script>

</body>
</html>
<h2>Customer Orders</h2>

<table border="1" width="100%">
<thead>

<tr>
<th>Name</th>
<th>Phone</th>
<th>Dress</th>
<th>Amount</th>
<th>Paid</th>
<th>Due</th>
<th>Status</th>
<th>Photo</th>
<th>Edit</th>
<th>Delete</th>
<th>Action</th>
</tr>

</thead>

<tbody id="orderTable">

</tbody>

</table>
