<!DOCTYPE html>

<html>

<head>
<title>Super Tailor Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Super Tailor Dashboard</h1>

<h2>Add Customer Order</h2>

<input id="name" placeholder="Customer Name">
<br><br>

<input id="phone" placeholder="Mobile Number">
<br><br>

<input id="dress" placeholder="Dress Type">
<br><br>

<input id="amount" placeholder="Total Amount">
<br><br>

<input id="paid" placeholder="Amount Paid">
<br><br>

<input id="dueDate" type="date">
<br><br>

<select id="status">
<option>Stitching</option>
<option>Ready</option>
</select>

<br><br>

<input type="file" id="photo">

<br><br>

<button onclick="saveOrder()">Save Order</button>

<hr>

<h2>Search Customer</h2>

<input 
type="text"
id="searchInput"
placeholder="Search name or phone..."
onkeyup="searchOrders()"
style="width:300px;padding:8px;margin-bottom:10px;">

<h2>Customer Orders</h2>

<table border="1" width="100%">

<thead>

<tr>
<th>Name</th>
<th>Phone</th>
<th>Dress</th>
<th>Amount</th>
<th>Paid</th>
<th>Due</th>
<th>Status</th>
<th>Photo</th>
<th>Edit</th>
<th>Delete</th>
</tr>

</thead>

<tbody id="orderTable">

</tbody>

</table>

<script type="module" src="script.js"></script>

</body>
</html>
