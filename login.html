<!DOCTYPE html>
<html>
<head>
<title>Super Tailor Login</title>

<style>

body{
font-family: Arial;
background:#f2f2f2;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.loginBox{
background:white;
padding:40px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
text-align:center;
width:300px;
}

h2{
margin-bottom:20px;
}

input{
width:100%;
padding:10px;
font-size:18px;
text-align:center;
margin-bottom:20px;
border:1px solid #ccc;
border-radius:5px;
}

button{
width:100%;
padding:10px;
background:#007bff;
color:white;
border:none;
border-radius:5px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#0056b3;
}

.error{
color:red;
margin-top:10px;
}

</style>

</head>

<body>

<div class="loginBox">

<h2>Super Tailor Login</h2>

<input type="password" id="code" placeholder="Enter 6 digit secret code">

<button onclick="checkCode()">Login</button>

<p class="error" id="error"></p>

</div>

<script>

const SECRET_CODE = "654321"   // change this

function checkCode(){

let code = document.getElementById("code").value

if(code === SECRET_CODE){

localStorage.setItem("tailorLogin","true")

window.location = "dashboard.html"

}
else{

document.getElementById("error").innerText = "Wrong secret code"

}

}

</script>

</body>
</html>
