<!DOCTYPE html>
<html>
<head>
<title>Check Order Status</title>
<style>

body{
font-family: Arial, sans-serif;
background: linear-gradient(135deg,#2c3e50,#4ca1af);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
margin:0;
}

.container{
background:white;
padding:40px;
width:420px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
text-align:center;
}

h1{
margin-top:0;
color:#333;
}

input{
width:70%;
padding:12px;
border:1px solid #ccc;
border-radius:6px;
font-size:15px;
}

button{
padding:12px 18px;
border:none;
background:#007bff;
color:white;
border-radius:6px;
cursor:pointer;
font-size:15px;
}

button:hover{
background:#0056b3;
}

#result{
margin-top:25px;
text-align:left;
background:#f7f7f7;
padding:15px;
border-radius:8px;
}

</style>
</head>

<body>

<div class="container">

<h1>Super Tailor</h1>
<h3>Check Your Dress Status</h3>

<input id="searchPhone" placeholder="Enter Mobile Number">
<button onclick="checkStatus()">Check</button>

<div id="result"></div>

<div id="progressBar" class="progress">

<div class="step" id="step1">
<div class="circle">1</div>
<div class="label">Received</div>
</div>

<div class="step" id="step2">
<div class="circle">2</div>
<div class="label">Stitching</div>
</div>

<div class="step" id="step3">
<div class="circle">3</div>
<div class="label">Ready</div>
</div>

<div class="step" id="step4">
<div class="circle">4</div>
<div class="label">Collected</div>
</div>

</div>

</div>

<script type="module" src="script.js"></script>

</body>
</html>
